name: Build and Deploy to AWS EKS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1               # CHANGE: your AWS region
  ECR_REPOSITORY: hello-javalin       # CHANGE: your ECR repository name
  EKS_CLUSTER_NAME: fabulous-bluegrass-dinosaur    # CHANGE: your EKS cluster name

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout source
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set up JDK 21
      # ------------------------------------------------------------------ #
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ------------------------------------------------------------------ #
      # 3. Build fat JAR with Maven
      # ------------------------------------------------------------------ #
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ------------------------------------------------------------------ #
      # 4. Configure AWS credentials
      #    Requires these GitHub Secrets to be set in your repository:
      #      AWS_ACCESS_KEY_ID
      #      AWS_SECRET_ACCESS_KEY
      # ------------------------------------------------------------------ #
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ------------------------------------------------------------------ #
      # 5. Log in to Amazon ECR
      # ------------------------------------------------------------------ #
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ------------------------------------------------------------------ #
      # 6. Build, tag, and push Docker image to ECR
      # ------------------------------------------------------------------ #
      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Also tag as 'latest'
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------ #
      # 7. Update kubeconfig for EKS
      # ------------------------------------------------------------------ #
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER_NAME }}
          aws sts get-caller-identity
          kubectl get nodes

      # ------------------------------------------------------------------ #
      # 8. Substitute image placeholder and apply Kubernetes manifests
      # ------------------------------------------------------------------ #
      - name: Deploy to EKS
        env:
          ECR_REGISTRY:    ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY:  ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG:       ${{ github.sha }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
              k8s/deployment.yaml
          kubectl apply --validate=false -f k8s/deployment.yaml
          kubectl apply --validate=false -f k8s/service.yaml
          kubectl rollout status deployment/hello-javalin --timeout=120s
